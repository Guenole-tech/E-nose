; PlatformIO Project Configuration File — e-Nose Firmware
; Build: pio run
; Flash: pio run --target upload --upload-port /dev/ttyUSB0
; Monitor: pio device monitor --baud 115200

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform  = espressif32@6.6.0
board     = esp32dev
framework = arduino

; Build flags
build_flags =
    -std=gnu++17
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    -O2

; Library dependencies
lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson  @ ^7.0.4

; Monitor
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; OTA partition scheme (enables app0/app1 + OTA)
board_build.partitions = min_spiffs.csv

; Upload
upload_speed = 921600
